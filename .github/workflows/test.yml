name: CI Tests

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install runpod requests huggingface-hub

      - name: Syntax check – handler.py
        run: python -m py_compile handler.py && echo "handler.py OK"

      - name: Syntax check – client.py
        run: python -m py_compile client.py && echo "client.py OK"

      - name: Validate Dockerfile syntax
        run: |
          docker run --rm -i hadolint/hadolint < Dockerfile || true

      - name: Check startup.sh is POSIX-compatible
        run: |
          bash -n startup.sh && echo "startup.sh OK"
